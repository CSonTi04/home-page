<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <div id="top-bar">
      <button id="reset-layout" class="ctrl-btn" title="Reset tile order to default">&#x21BA; Reset layout</button>
      <button id="theme-toggle" class="ctrl-btn" title="Toggle light/dark theme">&#x2600;&#xFE0F;</button>
    </div>

    <header id="clock" aria-label="Current time and date">
      <span id="clock-time">00:00:00</span>
      <span id="clock-date"></span>
      <span id="clock-day"></span>
    </header>

    <form id="search-form" role="search" aria-label="Web search">
      <input
        id="search-input"
        type="search"
        placeholder="Keresés…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search query"
      >
    </form>

    <main id="grid" aria-label="Bookmarks"></main>

  </div>

  <!-- Example/GH-Pages fallback: always loaded, sets window.LINKS_DATA to sample bookmarks.
       See data/links_example.js for format. -->
  <script src="./data/links_example.js"></script>
  <!-- Local override: if data/links.js exists (gitignored), it overwrites window.LINKS_DATA
       with your personal bookmarks. Safe to omit — missing file is silently ignored. -->
  <script src="./data/links.js" onerror="console.info('[HomePage] data/links.js not loaded (file missing or error); using links_example.js data.')"></script>

  <script src="script.js"></script>
</body>
</html>
